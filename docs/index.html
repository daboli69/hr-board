<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>HR Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel-2:#1B222B; --line:#252D38;
    --ink:#E8EDF2; --muted:#8A95A3; --faint:#5B6573;
    --seam:#C8472B;            /* baseball-seam red, the one accent */
    --cold:#3E7CB1; --hot:#E4572E;
    --good:#5FB97A; --bad:#D6604A;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding-bottom:60px}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}

  /* ---- header ---- */
  header{position:sticky;top:0;z-index:20;background:rgba(14,17,22,.92);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:14px 16px 12px;padding-top:max(14px,env(safe-area-inset-top))}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-family:Archivo;font-weight:900;font-size:22px;letter-spacing:-.02em;
    margin:0;text-transform:uppercase}
  .brand h1 .yard{color:var(--seam)}
  .stamp{font-size:11px;color:var(--muted)}
  .stamp.mono{letter-spacing:.02em}
  .meta{display:flex;gap:14px;margin-top:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .meta b{color:var(--ink);font-weight:600}

  .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--muted);font:inherit;font-size:12px;
    padding:7px 12px;cursor:pointer;font-weight:500}
  .seg button[aria-pressed="true"]{background:var(--panel-2);color:var(--ink)}
  .search{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;color:var(--ink);font:inherit;font-size:13px;padding:8px 11px}
  .search::placeholder{color:var(--faint)}

  .legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--muted)}
  .grad{height:7px;width:120px;border-radius:4px;
    background:linear-gradient(90deg,var(--cold),#3a4250 48%,var(--hot))}

  /* ---- list ---- */
  main{padding:10px 12px 0;max-width:760px;margin:0 auto}
  .pending{font-size:12px;color:var(--muted);background:var(--panel);
    border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin:8px 0}

  .row{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    margin:5px 0;overflow:hidden}
  /* compact grid row */
  .crow,.thead{display:grid;grid-template-columns:16px 32px 1fr auto;
    gap:7px;align-items:center}
  .crow{padding:7px 9px;cursor:pointer}
  .thead{padding:7px 9px;position:sticky;top:var(--hh,200px);z-index:8;background:var(--bg);
    border-bottom:1px solid var(--line);margin-bottom:2px}
  .thead .rank{width:auto}
  .th{font-size:9.5px;letter-spacing:.04em;color:var(--faint);text-transform:uppercase;
    font-weight:600;cursor:pointer;text-align:center;white-space:nowrap}
  .th.cheath{text-align:center}.th.cwhoh{text-align:left}
  .th.on{color:var(--ink)}
  .cheat{font-family:Archivo;font-weight:900;font-size:15px;height:30px;border-radius:7px;
    display:flex;align-items:center;justify-content:center}
  .cwho{min-width:0}
  .cwho .name{font-family:Archivo;font-weight:700;font-size:14px;letter-spacing:-.01em;
    display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cmini{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .cmetrics{display:grid;grid-template-columns:repeat(4,minmax(36px,42px));gap:6px}
  .cm{font-family:"IBM Plex Mono",monospace;font-size:12.5px;font-weight:600;text-align:center;
    padding:5px 0;border-radius:6px;font-variant-numeric:tabular-nums}
  .row.open .crow{background:var(--panel-2)}
  .rank{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--faint);text-align:right}
  .bats{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:4px;
    padding:1px 4px;font-weight:600}
  .matchup{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45}
  .matchup .vs{color:var(--ink)}
  .vuln{color:var(--seam);font-weight:600}
  .armbadge{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);
    border:1px solid var(--line);border-radius:5px;padding:2px 7px;line-height:1.5}
  .arms{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin:9px 0 4px;overflow:hidden}
  .arms-head{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer}
  .arms-head h3{margin:0;font-family:Archivo;font-weight:700;font-size:13px;letter-spacing:.02em;text-transform:uppercase}
  .arms-head .sub{font-size:11px;color:var(--muted)}
  .arms-body{display:none;border-top:1px solid var(--line)}
  .arms.open .arms-body{display:block}
  .arm-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
    padding:9px 13px;border-bottom:1px solid var(--line);font-size:12px}
  .arm-row:last-child{border-bottom:none}
  .arm-sc{font-family:Archivo;font-weight:900;font-size:17px;width:38px;text-align:center;border-radius:8px;padding:3px 0}
  .arm-nm{min-width:0}
  .arm-nm b{font-weight:600}
  .arm-tag{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:5px}
  /* tracker */
  .trk{max-width:760px;margin:0 auto}
  .trk-sum{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin:8px 0;font-size:13px;line-height:1.6}
  .trk-sum b{color:var(--ink)}
  .trk h3{font-family:Archivo;font-weight:700;font-size:13px;letter-spacing:.02em;text-transform:uppercase;margin:18px 0 8px}
  .trk-row{display:grid;grid-template-columns:78px 1fr 64px;gap:10px;align-items:center;padding:7px 2px;font-size:13px}
  .trk-row .lab{color:var(--muted);font-weight:600}
  .trk-bar{height:18px;background:var(--panel-2);border-radius:5px;overflow:hidden}
  .trk-bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cold),var(--hot))}
  .trk-row .val{font-family:"IBM Plex Mono",monospace;font-size:12px;text-align:right;color:var(--ink)}
  .trk-day{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:7px 0;padding:11px 13px;font-size:12.5px}
  .trk-day .d{font-family:Archivo;font-weight:700;font-size:14px}
  .trk-day .ln{color:var(--muted);margin-top:3px;line-height:1.5}
  .caret{color:var(--faint);font-size:13px;transition:transform .18s ease}
  .row.open .caret{transform:rotate(90deg)}
  .row.thin{opacity:.5}

  /* ---- metric strip ---- */
  .strip{display:flex;gap:0;border-top:1px solid var(--line);overflow-x:auto;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .strip::-webkit-scrollbar{display:none}
  .mcell{flex:1;min-width:64px;padding:9px 4px 10px;text-align:center;
    border-right:1px solid var(--line)}
  .mcell:last-child{border-right:none}
  .mcell .k{font-size:9px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .mcell .r{font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:600;
    margin-top:4px;border-radius:6px;padding:2px 0;font-variant-numeric:tabular-nums}
  .mcell .sc{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--muted);
    margin-top:3px;font-variant-numeric:tabular-nums}

  /* ---- expand ---- */
  .detail{display:none;border-top:1px solid var(--line);background:var(--panel-2);padding:13px}
  .row.open .detail{display:block}
  .detail h4{margin:0 0 8px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
  table.win{width:100%;border-collapse:collapse;font-family:"IBM Plex Mono",monospace;font-size:12px}
  table.win th,table.win td{padding:5px 6px;text-align:right;border-bottom:1px solid var(--line)}
  table.win th:first-child,table.win td:first-child{text-align:left;color:var(--muted)}
  table.win thead th{color:var(--faint);font-weight:500;font-size:10px;letter-spacing:.05em}
  .arm{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.6}
  .arm b{color:var(--ink)}
  .bd{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
  .bd span{font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:3px 7px}

  .empty{color:var(--muted);text-align:center;padding:50px 20px;font-size:14px}
  footer{max-width:760px;margin:18px auto 0;padding:0 14px;color:var(--faint);font-size:11px;line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Going <span class="yard">Yard</span></h1>
    <span class="stamp mono" id="stamp">—</span>
  </div>
  <div class="meta" id="meta"></div>
  <div class="controls" style="margin-top:10px">
    <div class="seg" id="view">
      <button data-view="board" aria-pressed="true">Board</button>
      <button data-view="tracker" aria-pressed="false">Tracker</button>
    </div>
  </div>
  <div id="boardControls">
  <div class="controls" style="margin-top:8px">
    <div class="seg" id="sort">
      <button data-sort="heat" aria-pressed="true">Heat</button>
      <button data-sort="name">Name</button>
      <button data-sort="time">Time</button>
    </div>
    <input class="search" id="search" placeholder="Search hitter or team…" />
    <div class="seg" id="thin"><button id="thinBtn" aria-pressed="false">Hide thin</button></div>
  </div>
  <div class="controls" style="margin-top:8px">
    <div class="seg" id="floor">
      <button data-min="0" aria-pressed="true">All</button>
      <button data-min="40">40+</button>
      <button data-min="55">55+</button>
      <button data-min="70">70+</button>
    </div>
    <select class="search" id="gameSel" style="flex:0 1 auto;min-width:140px">
      <option value="">All games</option>
    </select>
    <span id="shown" class="stamp" style="align-self:center"></span>
  </div>
  <div class="legend">
    <span>below</span><div class="grad"></div><span>elite</span>
    <span style="margin-left:6px">· four signals, last 2 weeks — orange clears the "good" mark</span>
  </div>
  </div>
</header>

<main id="main"><div class="empty">Loading board…</div></main>
<footer id="foot"></footer>

<script>
// the four signals that drive the ranking, in your order, with poor/good/elite anchors
const CORE = [
  {k:"pull_air_pct", label:"Pull%",    poor:28, good:40, elite:55, fmt:v=>fmt(v,1)},
  {k:"avg_ev",       label:"EV",       poor:86, good:88.5, elite:91.5, fmt:v=>fmt(v,1)},
  {k:"barrel_pct",   label:"Brl%",     poor:6,  good:11, elite:17, fmt:v=>fmt(v,1)},
  {k:"ideal_aa_pct", label:"IdealAA%", poor:45, good:58, elite:70, fmt:v=>fmt(v,1)},
];
const EXTRA = [
  {k:"iso",        label:"ISO",     fmt:v=>fmt(v,3,true)},
  {k:"slg",        label:"SLG",     fmt:v=>fmt(v,3,true)},
  {k:"bat_speed",  label:"Bat Spd", fmt:v=>fmt(v,1)},
  {k:"hardhit_pct",label:"HH%",     fmt:v=>fmt(v,1)},
  {k:"launch_angle",label:"LA",     fmt:v=>fmt(v,1)},
  {k:"fb_pct",     label:"FB%",      fmt:v=>fmt(v,1)},
  {k:"pull_pct",   label:"Pull(all)",fmt:v=>fmt(v,1)},
];
let BOARD=null, HISTORY=null, view="board", sortKey="heat", q="", hideThin=false, minHeat=0, gameFilter="";

function fmt(v,d,strip){
  if(v===null||v===undefined||Number.isNaN(v)) return "–";
  let s=Number(v).toFixed(d);
  if(strip) s=s.replace(/^0/,"");
  return s;
}
// threshold tint for the four signals: hot above good, blue below poor, neutral between
function threshTint(v, m){
  if(v===null||v===undefined) return "transparent";
  if(v>=m.elite) return "rgba(228,87,46,.42)";
  if(v>=m.good)  return "rgba(228,87,46,.22)";
  if(v<m.poor)   return "rgba(62,124,177,.30)";
  return "transparent";
}
function chipColor(h){                         // 0..100 -> cold..hot
  const t=Math.max(0,Math.min(100,h))/100;
  const cold=[62,124,177], mid=[58,66,80], hot=[228,87,46];
  const lerp=(a,b,x)=>a.map((v,i)=>Math.round(v+(b[i]-v)*x));
  const c = t<0.5? lerp(cold,mid,t*2) : lerp(mid,hot,(t-0.5)*2);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function timeStr(iso){
  if(!iso) return "";
  try{const d=new Date(iso);
    return d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});}catch{return "";}
}

function render(){
  const main=document.getElementById("main");
  if(!BOARD){return;}
  let players=BOARD.players.slice();
  const isThin=p=>((p.score_breakdown&&p.score_breakdown.flags)||[]).some(f=>f.indexOf("thin")===0);
  if(hideThin) players=players.filter(p=>!isThin(p));
  if(minHeat>0) players=players.filter(p=>p.heat>=minHeat);
  if(gameFilter) players=players.filter(p=>String(p.game_pk)===gameFilter);
  if(q){const t=q.toLowerCase();
    players=players.filter(p=>p.name.toLowerCase().includes(t)||(p.team||"").toLowerCase().includes(t)||(p.opp_team||"").toLowerCase().includes(t));}
  const sortVal=(p,k)=>{
    if(k==="arm") return (p.opp_pitcher&&p.opp_pitcher.hr_score!=null)?p.opp_pitcher.hr_score:-1;
    if(["pull_air_pct","avg_ev","barrel_pct","ideal_aa_pct"].indexOf(k)>=0){
      const v=(p.metrics[k]||{}).recent; return v==null?-1:v;
    }
    return p.heat;
  };
  players.sort((a,b)=>{
    if(sortKey==="name") return a.name.localeCompare(b.name);
    if(sortKey==="time") return (a.time||"").localeCompare(b.time||"")|| b.heat-a.heat;
    return sortVal(b,sortKey)-sortVal(a,sortKey);
  });
  const sc=document.getElementById("shown"); if(sc) sc.textContent=players.length+" shown";

  let html="";
  if(BOARD.lineups_pending&&BOARD.lineups_pending.length){
    html+=`<div class="pending">${BOARD.lineups_pending.length} game(s) waiting on lineups — they fill in automatically as teams post them.</div>`;
  }
  // Arms today: starters ranked by HR vulnerability
  if(BOARD.arms&&BOARD.arms.length){
    let arows="";
    BOARD.arms.forEach(a=>{
      if(a.hr_score==null) return;
      const f=a.form||{label:"",color:"#8A95A3"};
      const fl=(a.flags||[]).filter(x=>x.indexOf("thin")!==0).slice(0,2).join(" · ");
      arows+=`<div class="arm-row">
        <div class="arm-sc" style="background:${chipColor(a.hr_score)}">${a.hr_score}</div>
        <div class="arm-nm"><b>${a.name}</b> <span style="color:var(--muted)">${a.team}→${a.opp} · ${a.park||""}</span>
          ${fl?`<div style="color:var(--muted);font-size:11px;margin-top:2px">${fl}</div>`:""}</div>
        <div class="arm-tag" style="color:${f.color};border:1px solid ${f.color}">${f.label}</div>
      </div>`;
    });
    const shellable=BOARD.arms.filter(a=>a.form&&(a.form.label==="SHELLABLE"||a.form.label==="SLIPPING")).length;
    html+=`<div class="arms" id="armsPanel">
      <div class="arms-head" onclick="document.getElementById('armsPanel').classList.toggle('open')">
        <h3>Arms Today</h3>
        <span class="sub">${shellable} shellable · tap to ${'expand'}</span>
      </div>
      <div class="arms-body">${arows}</div>
    </div>`;
  }
  if(!players.length){ main.innerHTML=`<div class="empty">No hitters match.</div>`; return; }

  players.forEach((p,i)=>{
    const col=chipColor(p.heat);
    const op=p.opp_pitcher||{};
    const form=op.form||null;
    const armBadge = (op.hr_score!=null)
      ? `<span class="armbadge" style="border-color:${form?form.color:'var(--line)'};color:${form?form.color:'var(--muted)'}">`
        +`${op.name||'arm'} · HR ${op.hr_score}${form?` · ${form.label}`:''}</span>`
      : (op.name?`<span class="armbadge">${op.name}</span>`:'');

    let strip="";
    CORE.forEach(m=>{
      const cell=p.metrics[m.k]||{};
      strip+=`<div class="mcell">
        <div class="k">${m.label}</div>
        <div class="r" style="background:${threshTint(cell.recent,m)}">${m.fmt(cell.recent)}</div>
        <div class="sc">${m.fmt(cell.season)} · ${m.fmt(cell.career)}</div>
      </div>`;
    });

    // extra context metrics (recent · season · career)
    let extra="";
    EXTRA.forEach(m=>{
      const cell=p.metrics[m.k]||{};
      extra+=`<div class="mcell">
        <div class="k">${m.label}</div>
        <div class="r">${m.fmt(cell.recent)}</div>
        <div class="sc">${m.fmt(cell.season)} · ${m.fmt(cell.career)}</div>
      </div>`;
    });

    // detail: trend across windows for the four signals
    const W=["L5","L14d","L30"];
    let wrows="";
    [["Pull%","pull_air_pct",1],["EV","avg_ev",1],["Brl%","barrel_pct",1],["IdealAA%","ideal_aa_pct",1],["HR","hr",0],["BBE","bb_count",0]].forEach(([lab,key,dec])=>{
      let tds="";
      W.forEach(w=>{const val=(p.windows[w]||{})[key];
        tds+=`<td>${(key==="hr"||key==="bb_count")?(val??"–"):fmt(val,dec)}</td>`;});
      wrows+=`<tr><td>${lab}</td>${tds}</tr>`;
    });
    const bd=p.score_breakdown||{};
    const flags=(bd.flags||[]);
    const bdChips=Object.entries(bd).filter(([k])=>k!=="note"&&k!=="flags")
      .map(([k,v])=>`<span>${k.replace(/_/g," ")}: ${v}</span>`).join("");
    const flagChips=flags.map(f=>`<span style="color:var(--ink);border-color:var(--seam)">${f}</span>`).join("");

    // opposing-arm block: recent vs season HR-vulnerability + red flags
    const PR=op.recent||{}, PS=op.season||{};
    const prow=(lab,key,dec)=>`<tr><td>${lab}</td><td>${fmt(PR[key],dec)}</td><td>${fmt(PS[key],dec)}</td></tr>`;
    const armFlags=(op.flags||[]).map(f=>`<span style="color:var(--ink);border-color:${form?form.color:'var(--seam)'}">${f}</span>`).join("");
    const armBlock = (op.hr_score!=null) ? `
        <h4 style="margin-top:16px">Opposing arm — HR vulnerability
          <span style="color:${form?form.color:'var(--muted)'}">${op.hr_score}/100${form?` · ${form.label}`:''}</span></h4>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">recent ${op.recent_score??'–'} · season ${op.season_score??'–'} (2wk vs season)</div>
        <table class="win"><thead><tr><th>${op.name||'arm'} (${op.throws||'?'}HP)</th><th>2wk</th><th>Szn</th></tr></thead><tbody>
          ${prow('Barrel% allowed','barrel_pct_allowed',1)}
          ${prow('HardHit% allowed','hardhit_pct_allowed',1)}
          ${prow('EV allowed','avg_ev_allowed',1)}
          ${prow('HR/PA%','hr_per_pa',1)}
          ${prow('Ideal AA allowed','ideal_aa_allowed',1)}
          ${prow('Pull-air allowed','pull_air_allowed',1)}
          ${prow('SwStr% (whiff)','swstr_pct_allowed',1)}
          ${prow('FB velo','fb_velo',1)}
        </tbody></table>
        ${op.recent&&op.recent.velo_trend!=null?`<div class="arm">Velo trend (2wk vs szn): <b style="color:${op.recent.velo_trend<=-0.8?'var(--seam)':'var(--ink)'}">${op.recent.velo_trend>0?'+':''}${op.recent.velo_trend} mph</b></div>`:''}
        ${armFlags?`<div class="bd" style="margin-top:10px">${armFlags}</div>`:'<div class="arm">No red flags.</div>'}
    ` : `<div class="arm"><b>Opposing arm:</b> ${op.name||'—'}</div>`;

    // compact mini-cells for the four signals (threshold-colored)
    let mini="";
    CORE.forEach(m=>{
      const v=(p.metrics[m.k]||{}).recent;
      mini+=`<div class="cm" style="background:${threshTint(v,m)}">${m.fmt(v)}</div>`;
    });
    const armSc = (p.opp_pitcher&&p.opp_pitcher.hr_score!=null)?p.opp_pitcher.hr_score:null;
    const armCol = armSc!=null?chipColor(armSc):"transparent";

    html+=`<div class="row${isThin(p)?" thin":""}" data-i="${i}">
      <div class="crow" onclick="toggle(this)">
        <div class="rank mono">${i+1}</div>
        <div class="cheat" style="background:${col}">${p.heat}</div>
        <div class="cwho">
          <div class="name">${p.name}<span class="bats">${p.bats||"?"}</span></div>
          <div class="cmini">${p.team}→${p.opp_team} · ${timeStr(p.time)}${armSc!=null?` · arm <b style="color:${armCol}">${armSc}</b>`:""} · ${(p.windows&&p.windows.L14d&&p.windows.L14d.pa!=null)?`${p.windows.L14d.pa}PA`:"–"}</div>
        </div>
        <div class="cmetrics">${mini}</div>
      </div>
      <div class="detail">
        <div class="matchup" style="margin-bottom:10px">${p.team} vs ${p.opp_team} · ${timeStr(p.time)} · ${p.park||""} · park ${fmt(p.park_hr_factor,2)}× · ${armBadge}</div>
        <h4>Four signals — recent · season · career</h4>
        <div class="strip" style="border:1px solid var(--line);border-radius:10px">${strip}</div>
        <h4 style="margin-top:14px">Trend (last 2 wk vs game windows)</h4>
        <table class="win"><thead><tr><th></th><th>L5</th><th>2wk</th><th>L30</th></tr></thead>
        <tbody>${wrows}</tbody></table>
        <h4 style="margin-top:14px">Context (recent · season · career)</h4>
        <div class="strip" style="border:1px solid var(--line);border-radius:10px">${extra}</div>
        ${flagChips?`<div class="bd" style="margin-top:12px">${flagChips}</div>`:""}
        ${armBlock}
        <div class="bd">${bdChips}</div>
      </div>
    </div>`;
  });
  main.innerHTML=thead()+html;
  setHH();
}
function thead(){
  const cols=[["pull_air_pct","PULL"],["avg_ev","EV"],["barrel_pct","BRL"],["ideal_aa_pct","IAA"]];
  let cells=cols.map(([k,l])=>`<div class="th ${sortKey===k?'on':''}" onclick="setSort('${k}')">${l}${sortKey===k?' ▼':''}</div>`).join("");
  return `<div class="thead">
    <div class="rank"></div>
    <div class="th cheath ${sortKey==='heat'?'on':''}" onclick="setSort('heat')">HEAT${sortKey==='heat'?' ▼':''}</div>
    <div class="th cwhoh ${sortKey==='name'?'on':''}" onclick="setSort('name')">PLAYER${sortKey==='name'?' ▼':''}</div>
    <div class="cmetrics">${cells}</div>
  </div>`;
}
function setHH(){const h=document.querySelector("header");if(h)document.documentElement.style.setProperty("--hh",h.offsetHeight+"px");}
window.addEventListener("resize",setHH);
function setSort(k){ sortKey=k; render(); }
function renderView(){ if(view==="tracker") renderTracker(); else render(); }

function renderTracker(){
  const main=document.getElementById("main");
  if(!HISTORY||!HISTORY.days||!HISTORY.days.length){
    main.innerHTML=`<div class="empty">No graded days yet.<br>The tracker fills in each morning after games are final.</div>`;
    return;
  }
  const days=HISTORY.days.slice();
  // cumulative aggregates
  const TIER_ORDER=["70+","55-69","40-54","<40"];
  const tiers={}, forms={}; let sp=0,bp=0,tot=0,homered=0,players=0;
  days.forEach(d=>{
    players+=d.players||0; homered+=d.hitters_homered||0; tot+=d.total_hr||0;
    sp+=d.sp_hr||0; bp+=d.bp_hr||0;
    Object.entries(d.by_tier||{}).forEach(([k,v])=>{const t=tiers[k]||(tiers[k]={n:0,hr:0});t.n+=v.n;t.hr+=v.hr;});
    Object.entries(d.by_form||{}).forEach(([k,v])=>{const t=forms[k]||(forms[k]={n:0,hr:0});t.n+=v.n;t.hr+=v.hr;});
  });
  const rate=(o)=>o.n?100*o.hr/o.n:0;
  const maxTierRate=Math.max(1,...Object.values(tiers).map(rate));
  const maxFormRate=Math.max(1,...Object.values(forms).map(rate));

  const bar=(o,max)=>{
    const r=rate(o);
    return `<div class="trk-bar"><span style="width:${Math.min(100,100*r/max)}%"></span></div>
      <div class="val">${r.toFixed(1)}% <span style="color:var(--faint)">${o.hr}/${o.n}</span></div>`;
  };

  let tierRows=TIER_ORDER.filter(t=>tiers[t]).map(t=>
    `<div class="trk-row"><div class="lab">${t}</div>${bar(tiers[t],maxTierRate)}</div>`).join("");

  const FORM_ORDER=["SHELLABLE","STEADY-BAD","SLIPPING","HITTABLE","BAD-IMPROVING","STEADY","BOUNCING-BACK","DEALING"];
  let formRows=FORM_ORDER.filter(f=>forms[f]).map(f=>
    `<div class="trk-row"><div class="lab" style="font-size:11px">${f}</div>${bar(forms[f],maxFormRate)}</div>`).join("");

  let dayRows=days.slice().reverse().map(d=>{
    const top=(d.hr_log||[]).slice(0,4).map(h=>`${h.name} (${h.heat}, ${h.off})`).join(" · ");
    return `<div class="trk-day"><div class="d">${d.date}</div>
      <div class="ln"><b style="color:var(--ink)">${d.hitters_homered}/${d.players}</b> ranked hitters homered ·
        ${d.total_hr} HR · ${d.sp_hr} off SP / ${d.bp_hr} off BP</div>
      ${top?`<div class="ln">${top}</div>`:""}</div>`;
  }).join("");

  main.innerHTML=`<div class="trk">
    <div class="trk-sum"><b>${days.length}</b> days graded · <b>${homered}</b> of ${players} ranked hitters homered ·
      <b>${tot}</b> HR total · <b>${sp}</b> off starters / <b>${bp}</b> off the pen
      ${tot?`(${(100*sp/tot).toFixed(0)}% SP)`:""}</div>
    <h3>HR rate by Heat tier</h3>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">does a higher Heat actually produce more HRs?</div>
    ${tierRows||'<div class="ln" style="color:var(--muted)">—</div>'}
    <h3>HR rate by opposing-arm form</h3>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">do shellable / steady-bad arms get taken deep more?</div>
    ${formRows||'<div class="ln" style="color:var(--muted)">—</div>'}
    <h3>Daily log</h3>
    ${dayRows}
  </div>`;
}

function toggle(el){ el.closest(".row").classList.toggle("open"); }

document.getElementById("sort").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  sortKey=b.dataset.sort;
  [...document.querySelectorAll("#sort button")].forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();
});
document.getElementById("search").addEventListener("input",e=>{q=e.target.value;render();});
document.getElementById("thinBtn").addEventListener("click",e=>{
  hideThin=!hideThin; e.target.setAttribute("aria-pressed",hideThin); render();
});
document.getElementById("floor").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  minHeat=+b.dataset.min;
  [...document.querySelectorAll("#floor button")].forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();
});
document.getElementById("gameSel").addEventListener("change",e=>{gameFilter=e.target.value;render();});
document.getElementById("view").addEventListener("click",async e=>{
  const b=e.target.closest("button"); if(!b)return;
  view=b.dataset.view;
  [...document.querySelectorAll("#view button")].forEach(x=>x.setAttribute("aria-pressed",x===b));
  document.getElementById("boardControls").style.display = view==="tracker"?"none":"";
  if(view==="tracker" && !HISTORY){ await loadHistory(); }
  renderView();
});

async function loadHistory(){
  try{
    const r=await fetch("./history.json?t="+Date.now(),{cache:"no-store"});
    HISTORY=await r.json();
  }catch(err){ HISTORY={days:[]}; }
}

async function load(){
  try{
    const res=await fetch("./board.json?t="+Date.now(),{cache:"no-store"});
    BOARD=await res.json();
  }catch(err){
    document.getElementById("main").innerHTML=
      `<div class="empty">Couldn't load board.json yet.<br>Run the ETL or wait for the next scheduled update.</div>`;
    return;
  }
  const gen=new Date(BOARD.generated_at);
  document.getElementById("stamp").textContent=
    "updated "+gen.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
  const rw=BOARD.recent_window;
  document.getElementById("meta").innerHTML=
    `<span><b>${BOARD.slate_date}</b> slate</span>
     <span><b>${BOARD.games.length}</b> games</span>
     <span><b>${BOARD.players.length}</b> hitters</span>
     ${rw?`<span>2wk = <b>${rw.start}→${rw.end}</b></span>`:""}`;
  // populate game dropdown once
  const sel=document.getElementById("gameSel");
  if(sel.options.length<=1 && BOARD.games){
    BOARD.games.slice().sort((a,b)=>(a.time||"").localeCompare(b.time||"")).forEach(g=>{
      const o=document.createElement("option");
      o.value=String(g.game_pk); o.textContent=`${g.away} @ ${g.home}`;
      sel.appendChild(o);
    });
  }
  document.getElementById("foot").textContent=
    "All metrics = last 2 weeks. Heat ranks the four signals: Pull% (40%+ good), "+
    "EV (88.5+ good), Barrel%, Ideal Attack Angle% (58%+ good), then nudged by the opposing arm. "+
    "Orange = clears the good mark, blue = below. Tunable, not betting advice.";
  if(view==="tracker"){ if(!HISTORY) await loadHistory(); }
  renderView();
}
load();
setInterval(load, 5*60*1000);   // refresh if a new board.json was published
</script>
</body>
</html>
