name: Update HR Board

# Zero-touch: runs on a schedule through the day so lineups fill in as teams
# post them. Also runnable on demand from the Actions tab.
on:
  workflow_dispatch:          # manual "Run workflow" button
  schedule:
    # Times are UTC; the MLB season runs on EDT (UTC-4). Requested ET build times:
    #   6:30am, 10am, 12pm, 3pm, 5pm, 7pm ET  ->  10:30, 14, 16, 19, 21, 23 UTC
    # The build preserves the last good board if Savant throttles, so this is safe.
    # (In EST/winter these land one hour earlier ET; the season is almost entirely EDT.)
    - cron: "30 10 * * *"            # 6:30am ET — early lineups + overnight refresh
    - cron: "0 14,16,19,21,23 * * *" # 10am, 12pm, 3pm, 5pm, 7pm ET

permissions:
  contents: write             # allow committing the refreshed board.json

concurrency:
  group: hr-board
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Cache Statcast pulls
        uses: actions/cache@v4
        with:
          path: ~/.cache/pybaseball
          key: pybaseball-${{ github.run_id }}
          restore-keys: pybaseball-

      - name: Build board
        env:
          SEASON_START: "2026-03-26"   # opening day; bump each season
          RECENT_DAYS: "45"
          # Ballpark Pal — primary park-factor source (per-hitter model). If this secret is
          # absent the build silently falls back to etl/park_factors.py; nothing breaks.
          BPP_API_KEY: ${{ secrets.BPP_API_KEY }}
        run: python tests/canary.py && python -m etl.build_board

      - name: Fetch HR prop odds
        # 3 credits/call, one call per run. On the 6x/day board schedule that's ~540
        # credits/month — inside the free 1k tier. Never fails the build: if the key is
        # missing or the API errors, fetch_odds writes an error-marked odds.json and exits 0.
        env:
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
        run: python -m etl.fetch_odds || true

      - name: Commit updated board
        run: |
          git config user.name  "hr-board-bot"
          git config user.email "actions@github.com"
          BRANCH="${GITHUB_REF_NAME}"

          stage() {
            git add docs/board.json docs/snapshots 2>/dev/null || true
            git add docs/odds.json 2>/dev/null || true
            git add docs/park_factors.json 2>/dev/null || true
            git add docs/bvp_career.json 2>/dev/null || true
            git add docs/wind_sens.json 2>/dev/null || true
          }

          stage
          if git diff --staged --quiet; then
            echo "No change to commit"
            exit 0
          fi

          git commit -m "board: ${{ github.run_id }} [skip ci]"

          # Push with a conflict-proof retry. Another job (the grader) can push between our
          # build and our push; instead of a rebase that can wedge into a detached HEAD on
          # conflict, we retry: fetch, rebase, and if the rebase conflicts we ABORT it
          # cleanly and fall back to re-applying our files on top of the fresh remote tip.
          ok=0
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}" 2>/dev/null; then ok=1; break; fi
            echo "push $i failed (remote moved) — reconciling…"
            git fetch origin "${BRANCH}" || true
            if git rebase "origin/${BRANCH}"; then
              :  # clean rebase, loop will retry push
            else
              # rebase conflicted — abort it, hard-reset to remote, re-apply our outputs.
              echo "rebase conflicted — hard-resetting to remote and re-staging our files"
              git rebase --abort || true
              # save our just-built outputs, reset to remote tip, restore them, recommit
              tmp="$(mktemp -d)"
              for f in docs/board.json docs/odds.json docs/park_factors.json docs/bvp_career.json docs/wind_sens.json; do
                [ -f "$f" ] && mkdir -p "$tmp/$(dirname "$f")" && cp "$f" "$tmp/$f"
              done
              [ -d docs/snapshots ] && cp -r docs/snapshots "$tmp/docs/snapshots" 2>/dev/null || true
              git checkout -B "${BRANCH}" "origin/${BRANCH}"
              for f in docs/board.json docs/odds.json docs/park_factors.json docs/bvp_career.json docs/wind_sens.json; do
                [ -f "$tmp/$f" ] && cp "$tmp/$f" "$f"
              done
              [ -d "$tmp/docs/snapshots" ] && cp -r "$tmp/docs/snapshots/." docs/snapshots/ 2>/dev/null || true
              rm -rf "$tmp"
              stage
              if git diff --staged --quiet; then echo "nothing left to commit after reconcile"; ok=1; break; fi
              git commit -m "board: ${{ github.run_id }} [skip ci]"
            fi
            sleep 3
          done

          if [ "$ok" != "1" ]; then
            echo "::warning::board build succeeded but push could not be completed after retries; next run will pick it up"
            exit 0   # don't fail the whole run over a push race — the data is fine, next cron re-pushes
          fi
