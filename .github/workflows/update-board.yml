name: Update HR Board

# Zero-touch: runs on a schedule through the day so lineups fill in as teams
# post them. Also runnable on demand from the Actions tab.
on:
  workflow_dispatch:          # manual "Run workflow" button
  schedule:
    # times are UTC. EDT = UTC-4 in summer. Hourly 11am-8pm ET keeps pace with
    # lineup/probable confirmations; the build preserves the last good board if
    # Savant throttles, so frequent runs are safe.
    - cron: "0 15-23 * * *"     # 11am - 7pm ET, top of each hour
    - cron: "30 21-23 * * *"    # extra :30 passes 5:30/6:30/7:30 ET for late lineups

permissions:
  contents: write             # allow committing the refreshed board.json

concurrency:
  group: hr-board
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Cache Statcast pulls
        uses: actions/cache@v4
        with:
          path: ~/.cache/pybaseball
          key: pybaseball-${{ github.run_id }}
          restore-keys: pybaseball-

      - name: Build board
        env:
          SEASON_START: "2026-03-26"   # opening day; bump each season
          RECENT_DAYS: "45"
        run: python -m etl.build_board

      - name: Commit updated board
        run: |
          git config user.name  "hr-board-bot"
          git config user.email "actions@github.com"
          git add docs/board.json
          if git diff --staged --quiet; then
            echo "No change in board.json"
          else
            git commit -m "board: ${{ github.run_id }} [skip ci]"
            git push
          fi
