name: Grade HR Board

# Grades completed days against actual HRs. The grader backfills: each run grades any
# past day that has a committed snapshot and isn't already in history, so a single missed
# or delayed run can't drop a day. Running a few times a day keeps it self-correcting.
#
# REGRADE mode (manual only): re-grades every day that still has a snapshot on disk,
# discarding the old record. Needed after a grading-logic fix — the snapshots hold the
# raw inputs, so corrected logic recovers the true numbers. Scheduled runs never regrade.
on:
  workflow_dispatch:
    inputs:
      regrade:
        description: "Re-grade ALL days from snapshots (use after a grading-logic fix)"
        type: boolean
        default: false
  schedule:
    # 7am, 1pm, 7pm ET (EDT = UTC-4). Yesterday is final by the 7am run; the later runs
    # retry anything that failed and backfill any older ungraded day. GitHub crons drift
    # and occasionally skip, which is exactly why we run thrice + backfill instead of once.
    - cron: "0 11,17,23 * * *"

permissions:
  contents: write

concurrency:
  group: hr-grade
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Cache Statcast pulls
        uses: actions/cache@v4
        with:
          path: ~/.cache/pybaseball
          key: pybaseball-${{ github.run_id }}
          restore-keys: pybaseball-

      - name: Grade board
        if: ${{ inputs.regrade != true }}
        run: python -m etl.track

      - name: REGRADE all days from snapshots
        if: ${{ inputs.regrade == true }}
        run: |
          echo "::warning::REGRADE mode — rebuilding every graded day from snapshots."
          python -m etl.track --regrade

      - name: Commit history
        run: |
          git config user.name  "hr-board-bot"
          git config user.email "actions@github.com"
          git add docs/history.json
          if git diff --staged --quiet; then
            echo "No history change"
          else
            MSG="grade: ${{ github.run_id }} [skip ci]"
            if [ "${{ inputs.regrade }}" = "true" ]; then
              MSG="regrade: rebuilt history from snapshots (${{ github.run_id }}) [skip ci]"
            fi
            git commit -m "$MSG"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
